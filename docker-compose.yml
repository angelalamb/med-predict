services:
  neo4j:
    image: neo4j:5
    container_name: neo4j-medpredict
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol (driver connection)
    environment:
      - NEO4J_AUTH=neo4j/medpredict-local
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  neo4j_data:
  neo4j_logs:
